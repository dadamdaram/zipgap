# ═══════════════════════════════════════════════════════════════
#  GitHub Actions — CI/CD 파이프라인
#  위치: .github/workflows/deploy.yml
#
#  트리거: main 브랜치 push
#  동작:
#    1. 린트 + 기본 테스트
#    2. Docker 이미지 빌드 → GHCR(GitHub Container Registry) 푸시
#    3. 서버에 SSH 배포 (선택)
# ═══════════════════════════════════════════════════════════════

name: CI/CD

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  IMAGE_NAME: ghcr.io/${{ github.repository_owner }}/jibgap

jobs:
  # ── 1. 테스트 ────────────────────────────────────────────────
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Python 설정
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: 의존성 설치
        run: |
          python -m venv .venv
          source .venv/bin/activate
          pip install -r requirements.txt

      - name: 임포트 검사
        run: |
          source .venv/bin/activate
          python -c "from backend.main import app; print('✅ 임포트 OK')"

      - name: DB 초기화 검사
        run: |
          source .venv/bin/activate
          python -c "from backend.database import init_db; init_db(); print('✅ DB OK')"

  # ── 2. Docker 빌드 + GHCR 푸시 (main 브랜치만) ──────────────
  docker:
    needs: test
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'
    permissions:
      contents: read
      packages: write

    steps:
      - uses: actions/checkout@v4

      - name: GHCR 로그인
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Docker Buildx 설정
        uses: docker/setup-buildx-action@v3

      - name: 이미지 빌드 + 푸시
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: |
            ${{ env.IMAGE_NAME }}:latest
            ${{ env.IMAGE_NAME }}:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          build-args: |
            MOLIT_KEY=${{ secrets.MOLIT_KEY }}

